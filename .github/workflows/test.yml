name: Test Suite

on:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  test:
    name: Foundry Contracts + Reactive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Bootstrap dependencies
        run: ./scripts/bootstrap.sh

      - name: Contracts build
        run: |
          cd contracts
          forge build

      - name: Contracts test
        run: |
          cd contracts
          forge test --offline

     